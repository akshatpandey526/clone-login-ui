<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="gbox">
      <head>
        <div class="upperline">
          <div class="upperlineleft">
            <figure class="chrome">
              <img src="akshat-logo.jpeg" alt="chrome" />
            </figure>
            <p>Demo ui</p>
          </div>

          <div class="upperlineright">
            <img src="minus-svgrepo-com.svg" alt="minus svg" />
            <img src="restore-svgrepo-com.svg" alt="restore svg" />
            <img src="close-svgrepo-com.svg" alt="close svg" />
          </div>
        </div>
        <div>
          <img src="reshot-icon-arrow-left-UZDAC2LESG.svg" alt="">
        </div>
      </head>
      <main>
        <div class="innerbox">
          <figure class="img">
            <img src="akshat-logo.jpeg" alt="google image" />
          </figure>
          <div class="firstline">
            <div class="one">
              <h1>Sign in to Demo ui</h1>
              <h5>Use Your Demo ui Account</h5>
            </div>
            <div class="two">
              <fieldset>
                <legend>Email or phone</legend>
                <input type="email" />
              </fieldset>
              <a href="#">Forgot email?</a>
            </div>
          </div>
          <div class="secondline">
            <h4>Not your computer? Use Guest Mode to sign in Privately.</h4>
            <a href="#"
              >Learn more about using Guest mode</a
            >
          </div>
          <div class="thirdline">
            <a href="" class="last-link">create account</a>
            <button class="button">next</button>
          </div>   
        
         
        </div>
        
        
      </main> 
      <div class="row-last">
        <div class="left-last">
          <select name="" id="">
            <option value="">English(united states)</option>
            <option value="">Hindi(india)</option>
            <option value="">Urdu(pakistani)</option>
          </select>
        </div>
        <div class="right-last">
          <a href="" class="no-color-links">Help</a>
          <a href="" class="no-color-links">Privacy</a>
          <a href="" class="no-color-links">Terms</a>
        </div>
      </div> 
      <footer>
        <p>This is a demo UI clone created for learning purposes only.</p>

      </footer>     
    </div>
  </body>
  
</html>
